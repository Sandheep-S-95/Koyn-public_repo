<svg width="150" height="40" viewBox="0 0 150 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&amp;display=swap');
    .koyn-text {
      font-family: 'Caveat', cursive;
      font-size: 38px;
      font-weight: 700;
      fill: #E0F2F1;
    }
    .koyn-accent {
      fill: #32E07E;
    }
    .koyn-icon {
      fill: url(#gold-gradient);
    }
  </style>
  <defs>
    <linearGradient id="gold-gradient" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EAB308" />
      <stop offset="100%" stop-color="#D4A007" />
    </linearGradient>
  </defs>

  <!-- Minimal Coin Icon -->
  <circle cx="20" cy="20" r="14" class="koyn-icon" />
  <circle cx="20" cy="20" r="9" fill="#0D1F1E" />
  <circle cx="20" cy="20" r="4" class="koyn-accent" />

  <!-- Cursive Text -->
  <text x="44" y="32" class="koyn-text">Koyn</text>
</svg>
